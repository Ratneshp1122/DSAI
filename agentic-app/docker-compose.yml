version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic_ai_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads   # persist uploaded files
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
